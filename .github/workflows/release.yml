name: Release

# Publica o JAR executável como GitHub Release ao criar uma tag semver (vX.Y.Z).
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Empacotar aplicação
        run: mvn -B -ntp -DskipTests package

      - name: Criar release com o JAR
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: target/*.jar
