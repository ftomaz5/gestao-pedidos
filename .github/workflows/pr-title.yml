name: Validar título do PR (Conventional Commits)

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  titulo-semantico:
    runs-on: ubuntu-latest
    steps:
      - name: Validar título no padrão Conventional Commits
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            test
            refactor
            perf
            build
            ci
            chore
