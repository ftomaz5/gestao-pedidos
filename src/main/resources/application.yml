spring:
  application:
    name: gestao-pedidos
  datasource:
    url: jdbc:h2:mem:pedidos
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
springdoc:
  swagger-ui:
    path: /swagger-ui.html
